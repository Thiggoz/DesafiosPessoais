<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Desafio dos Formulários - Cadastro Avançado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formulário de Cadastro Avançado</h1>
    <form onsubmit="mostrarMensagem(event)" method="post" autocomplete="on">

        <p>
            <label for="inome">Nome: </label>
            <input type="text" name="nome" id="inome" required minlength="5" maxlength="25" autocomplete="name">
        </p>

        <p>
            <label for="iemail">E-Mail: </label>
            <input type="email" name="email" id="iemail" required autocomplete="email">
        </p>

        <p>
            <label for="isen">Senha: </label>
            <input type="password" name="sen" id="isen" required minlength="8" maxlength="20">
        </p>

        <p>
            <label for="iconfsen">Confirmar Senha: </label>
            <input type="password" name="confsen" id="iconfsen" oninput="validarSenha()" required>
        </p>

        <p>
            <label for="idata">Data de Nascimento: </label>
            <input type="date" name="data" id="idata" required>
        </p>

        <p>
            <label for="isex">Gênero: </label>
            <input type="radio" name="sex" id="isex" value="M">
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>

    <script src="script.js"></script>
</body>
</html>
