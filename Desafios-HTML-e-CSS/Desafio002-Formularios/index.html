<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Desafio dos Formulários - Cadastro Avançado</title>
</head>
<body>
    <h1>Formulário de Cadastro Avançado</h1>
    <main>
        <form onsubmit="mostrarMensagem(event)" method="post" autocomplete="on">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <p>
                    <label for="inome">Nome: </label>
                    <input type="text" name="nome" id="inome" required minlength="5" maxlength="25" autocomplete="name">
                </p>
                <p>
                    <label for="iemail">E-Mail: </label>
                    <input type="email" name="email" id="iemail" required autocomplete="email">
                </p>
                <p>
                    <label for="isen">Senha: </label>
                    <input type="password" name="sen" id="isen" required minlength="8" maxlength="20" autocomplete="current-password">
                </p>
                <p>
                    <label for="iconfsen">Confirmar Senha: </label>
                    <input type="password" name="confsen" id="iconfsen" oninput="validarSenha()" required>
                </p>
                <p>
                    <label for="idata">Data de Nascimento: </label>
                    <input type="date" name="data" id="idata" required>
                </p>
                <fieldset>
                    <legend>Gênero</legend>
                        <input type="radio" name="sexo" id="imas" value="M"><label id="especial" for="imas">Masculino</label>
                        <input type="radio" name="sexo" id="ifem" value="F"><label id="especial" for="ifem">Feminino</label>
                </fieldset>
                <p>
                    <label for="ipais">País: </label>
                    <select name="pais" id="ipais">
                        <option value="" selected>--- Escolha ---</option>
                        <optgroup label="Países">
                            <option value="BR">Brasil</option>
                            <option value="ARG">Argentina</option>
                            <option value="EUA">Estados Unidos</option>
                            <option value="PY">Paraguai</option>
                            <option value="UY">Uruguai</option>
                        </optgroup>
                    </select>
                </p>
                <p>
                    <input type="checkbox" name="term" id="iterm" required><label for="iterm">Aceito os Termos e Condições do Uso</label>
                </p>
            </fieldset>
            <p>
                <input class="botao" type="submit" value="Cadastrar">
                <input class="botao" type="reset" value="Limpar">
            </p>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
