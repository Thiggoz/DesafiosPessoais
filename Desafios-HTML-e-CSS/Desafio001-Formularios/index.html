<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Desafio Formulário de Login Simples</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: whitesmoke;
        }

        input {
            border-radius: 5px;
        }

        input:focus {
            background-color: lightyellow;
            border: 2px solid black;
        }

        input.botao {
            background-color: rgba(0, 0, 255, 0.555);
            color: white;
            padding: 10px;
        }

        input.botao:hover {
            background-color: blue;
        }

        input.botao:focus {
            outline: 2px solid black;
        }
    </style>
</head>
<body>
    <h1>Desafio Formulário de Login Simples</h1>
    <form onsubmit="mostrarMensagem(event)" method="post" autocomplete="on">
        <fieldset>
            <legend>Cadastro do Sistema</legend>
            <p>
                <label for="iemail">Email: </label>
                <input type="email" name="email" id="iemail" required autocomplete="email">
            </p>
            <p>
                <label for="isen">Senha: </label>
                <input type="password" name="sen" id="isen" required minlength="8" maxlength="20">
            </p>
            <p>
                <input type="checkbox" name="lemb" id="ilemb"><label for="ilemb">Lembrar meus dados</label>
            </p>
        </fieldset>
        <p>
            <input class="botao" type="submit" value="Enviar">
            <input class="botao" type="reset" value="Limpar">
        </p>
    </form>

    <script src="cadastro.js"></script>
</body>
</html>
